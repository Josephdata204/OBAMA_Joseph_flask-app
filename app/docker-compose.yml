version: '3.8'

# ============================================================
# Docker Compose - Serveur VPN Pritunl + MongoDB
# TP3 - Conduite de Projet (Agile, DevOps, Kanban)
# Auteur : Joseph
# ============================================================

services:

  # -----------------------------------------------------------
  # Service MongoDB - Base de données pour Pritunl
  # -----------------------------------------------------------
  mongodb:
    image: mongo:4.4
    container_name: pritunl-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: pritunl
    volumes:
      - ./volumes/mongodb:/data/db
    networks:
      - pritunl-network
    # MongoDB n'expose pas son port à l'extérieur (sécurité)
    expose:
      - "27017"
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # -----------------------------------------------------------
  # Service Pritunl - Serveur VPN
  # -----------------------------------------------------------
  pritunl:
    image: jippi/pritunl:latest
    container_name: pritunl-server
    restart: unless-stopped
    privileged: true          # Nécessaire pour le module tun (VPN)
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    environment:
      PRITUNL_MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/pritunl?authSource=admin
    volumes:
      - ./volumes/pritunl:/var/lib/pritunl
    ports:
      - "443:443/tcp"         # Interface Web HTTPS
      - "80:80/tcp"           # Redirection HTTP
      - "1194:1194/udp"       # Port VPN OpenVPN (UDP)
      - "1194:1194/tcp"       # Port VPN OpenVPN (TCP)
    networks:
      - pritunl-network
    depends_on:
      mongodb:
        condition: service_healthy
    cap_add:
      - NET_ADMIN             # Permissions réseau pour le VPN
    devices:
      - /dev/net/tun:/dev/net/tun   # Module noyau tun pour VPN

# -----------------------------------------------------------
# Réseau privé dédié entre les services
# -----------------------------------------------------------
networks:
  pritunl-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
