pipeline {
    agent any

    environment {
        // Remplacer par votre nom d'utilisateur DockerHub
        DOCKERHUB_USER = 'josephndoumbe'
        IMAGE_NAME     = 'joseph-flask-app'
        IMAGE_TAG      = 'latest'
        // Identifiant Jenkins pour DockerHub (à créer dans Jenkins > Credentials)
        DOCKERHUB_CREDS = 'dockerhub-credentials'
        // URL de votre dépôt GitHub
        GITHUB_REPO = 'https://github.com/josephndoumbe/joseph-flask-app.git'
    }

    stages {

        stage('Clonage') {
            steps {
                echo '🔄 Clonage du dépôt GitHub...'
                git branch: 'main', url: "${GITHUB_REPO}"
                echo '✅ Clonage terminé avec succès.'
            }
        }

        stage('Image') {
            steps {
                echo '🏗️ Construction de l\'image Docker...'
                script {
                    docker.build("${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}", "./app")
                }
                echo '✅ Image construite avec succès : ${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}'
            }
        }

        stage('Publication') {
            steps {
                echo '🚀 Publication de l\'image sur DockerHub...'
                script {
                    docker.withRegistry('https://index.docker.io/v1/', DOCKERHUB_CREDS) {
                        docker.image("${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG}").push()
                    }
                }
                echo '✅ Image publiée avec succès sur DockerHub.'
            }
        }
    }

    post {
        success {
            echo '🎉 Pipeline exécuté avec succès ! Image disponible sur DockerHub.'
        }
        failure {
            echo '❌ Le pipeline a échoué. Vérifiez les logs ci-dessus.'
        }
        always {
            echo '🧹 Nettoyage des images locales...'
            sh "docker rmi ${DOCKERHUB_USER}/${IMAGE_NAME}:${IMAGE_TAG} || true"
        }
    }
}
